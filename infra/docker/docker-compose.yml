services:
  postgres:
    image: postgres:16-alpine
    container_name: agencywebsite-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: agencyadmin
      POSTGRES_PASSWORD: changeme_dev_only
      POSTGRES_DB: agencywebsite
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agencyadmin -d agencywebsite"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: agencywebsite-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
